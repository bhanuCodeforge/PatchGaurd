          * `staging` - Staging
          * `development` - Development
          * `test` - Test
      - in: query
        name: group
        schema:
          type: string
          format: uuid
      - in: query
        name: hostname
        schema:
          type: string
      - in: query
        name: last_seen_after
        schema:
          type: string
          format: date-time
      - in: query
        name: last_seen_before
        schema:
          type: string
          format: date-time
      - name: ordering
