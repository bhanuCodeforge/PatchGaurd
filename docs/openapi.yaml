openapi: 3.0.3
info:
  title: PatchGuard API
  version: 1.0.0
  description: "Enterprise Patch Management System. WebSocket API available at ws://<host>/ws/
    \n\nWebSocket Protocol: Connect to endpoints with JWT token and listen to dynamic
    event broadcast messages (Deployments, Discovery, Auth signals)."
  contact:
    name: Dev Team
    email: dev@patchguard.internal
  license:
    name: Proprietary
paths:
  /api/auth/change-password/:
    post:
      operationId: auth_change_password_create
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: auth_profile_partial_update
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/deployments/:
    get:
      operationId: v1_deployments_list
      parameters:
      - in: query
        name: created_by
        schema:
          type: string
          format: uuid
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - completed
          - draft
          - failed
          - in_progress
          - paused
          - rolling_back
          - scheduled
        description: |-
          * `draft` - Draft
          * `scheduled` - Scheduled
          * `in_progress` - In Progress
          * `paused` - Paused
          * `completed` - Completed
          * `failed` - Failed
          * `cancelled` - Cancelled
          * `rolling_back` - Rolling Back
      - in: query
        name: strategy
        schema:
          type: string
          enum:
          - canary
          - immediate
          - maintenance
          - rolling
        description: |-
          * `immediate` - Immediate
          * `canary` - Canary
          * `rolling` - Rolling
          * `maintenance` - Maintenance Window
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeploymentListList'
          description: ''
    post:
      operationId: v1_deployments_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeploymentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DeploymentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DeploymentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentCreate'
          description: ''
  /api/v1/deployments/{id}/:
    get:
      operationId: v1_deployments_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this deployment.
