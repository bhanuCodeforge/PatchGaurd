# PatchGuard Agent Configuration
# -----------------------------------------------------------------------
# Native dev (Windows/Linux/macOS):
#   server_url should point to the FastAPI WebSocket service.
#   rest_url   should point to the Django REST API.
#
# Docker / remote deployment:
#   Replace 'localhost' with the hostname or IP of the server.
#   e.g. server_url: "ws://192.168.1.100:8001/ws/agent"
# -----------------------------------------------------------------------

server_url: "ws://localhost:8001/ws/agent"
rest_url: "http://localhost:8000/api/v1"   # REST API base (for heartbeat + auto-register)

# IMPORTANT: these two values are device-specific.
# Copy the api_key and device_id from the Device record in the admin UI
# or GET /api/v1/devices/{id}/ and update here before starting the agent.
api_key: "wOiW2c6m4rWQqgZr6nwuXjWDGLa9EDSW"
device_id_override: "c9744198-772a-4984-ae76-7a24a703282b"

heartbeat_interval: 60                     # WebSocket heartbeat (seconds)
rest_heartbeat_interval: 300               # POST heartbeat to REST every N seconds (0 = disabled)
log_level: "info"                          # debug | info | warning | error

tags:
  - "production"
  - "web-server"

# Auto-register: set to true if api_key is blank and the device is not yet
# registered. The agent will POST to /api/v1/devices/register/ on first start.
auto_register: false
auto_register_hostname: null              # defaults to socket.gethostname()
auto_register_os_family: null            # defaults to detected OS family
auto_register_environment: "production"  # production | staging | development
