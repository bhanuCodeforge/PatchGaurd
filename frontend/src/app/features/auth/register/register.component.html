<div class="login-container">
  <div class="login-card" style="max-width:420px;">
    <div class="logo-section">
      <div class="shield-icon"></div>
      <h1>PatchGuard</h1>
      <p>Create your account</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="name-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" formControlName="first_name" placeholder="Jane"
            [class.ng-invalid]="registerForm.get('first_name')?.invalid"
            [class.ng-touched]="registerForm.get('first_name')?.touched">
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" formControlName="last_name" placeholder="Smith"
            [class.ng-invalid]="registerForm.get('last_name')?.invalid"
            [class.ng-touched]="registerForm.get('last_name')?.touched">
        </div>
      </div>

      <div class="form-group">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" formControlName="username"
          placeholder="jsmith" autocomplete="username"
          [class.ng-invalid]="registerForm.get('username')?.invalid"
          [class.ng-touched]="registerForm.get('username')?.touched">
        <span class="error-text"
          *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
          Username must be at least 3 characters
        </span>
      </div>

      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" formControlName="email"
          placeholder="jane@company.com" autocomplete="email">
        <span class="error-text"
          *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Valid email is required
        </span>
      </div>

      <div class="form-group">
        <label for="reg-password">Password <span class="text-muted" style="font-size:11px;">(min 12 chars)</span></label>
        <input type="password" id="reg-password" formControlName="password"
          placeholder="••••••••••••" autocomplete="new-password">
        <span class="error-text"
          *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be at least 12 characters
        </span>
      </div>

      <div class="form-group">
        <label for="reg-confirm">Confirm password</label>
        <input type="password" id="reg-confirm" formControlName="confirmPassword"
          placeholder="••••••••••••" autocomplete="new-password">
        <span class="error-text" *ngIf="pwdMismatch">
          Passwords do not match
        </span>
      </div>

      <button type="submit" class="submit-btn" [disabled]="registerForm.invalid || isLoading()">
        <span *ngIf="!isLoading()">Create Account</span>
        <div *ngIf="isLoading()" class="spinner"></div>
      </button>

    </form>

    <div class="footer" style="justify-content:center; margin-top:1.25rem;">
      <span style="color:#9ca3af; font-size:0.875rem;">
        Already have an account?&nbsp;
        <a routerLink="/login" style="color:#60a5fa;">Sign in</a>
      </span>
    </div>
  </div>
</div>
