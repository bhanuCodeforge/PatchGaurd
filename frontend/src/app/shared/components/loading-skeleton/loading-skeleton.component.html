<div [ngSwitch]="variant">
  <!-- KPI Row Skeleton -->
  <div *ngSwitchCase="'kpi-row'" class="row g-3">
    <div *ngFor="let i of [1, 2, 3, 4]" class="col-12 col-md-6 col-lg-3">
      <div class="shimmer" style="height: 100px; border-radius: 12px;"></div>
    </div>
  </div>

  <!-- Table Skeleton -->
  <div *ngSwitchCase="'table'" class="d-flex flex-column gap-2 mt-3">
    <div class="shimmer w-100" style="height: 44px; border-radius: 8px;"></div>
    <div *ngFor="let r of rows" class="shimmer w-100" style="height: 52px; border-radius: 6px;"></div>
  </div>

  <!-- Generic Card Skeleton -->
  <div *ngSwitchCase="'card'" class="shimmer w-100" style="height: 200px; border-radius: 12px;"></div>

  <!-- Chart Skeleton -->
  <div *ngSwitchCase="'chart'" class="shimmer w-100" style="height: 300px; border-radius: 12px;"></div>

  <!-- Single Line / Custom Skeleton -->
  <div *ngSwitchDefault class="shimmer w-100" [style.height.px]="height" style="border-radius: 6px;"></div>
</div>
