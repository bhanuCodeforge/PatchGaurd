name: patchguard-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: patchguard-postgres
    restart: always
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    # Internal network only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: patchguard-pgbouncer
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=25
      - MIN_POOL_SIZE=5
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: patchguard-redis
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    env_file: .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchguard-django
    restart: always
    user: "1000:1000"
    command: gunicorn config.wsgi:application --workers 4 --threads 2 --timeout 120 --bind 0.0.0.0:8000 --access-logfile - --error-logfile -
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  fastapi:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: patchguard-fastapi
    restart: always
    user: "1000:1000"
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --workers 4 --loop uvloop --http httptools
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchguard-celery-worker
    restart: always
    user: "1000:1000"
    command: celery -A config.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-8} --max-tasks-per-child=1000 -Ofair -Q critical,default,reporting
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchguard-celery-beat
    restart: always
    user: "1000:1000"
    command: celery -A config.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}
    depends_on:
      django:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    container_name: patchguard-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_files:/usr/share/nginx/html/static:ro
      - media_files:/usr/share/nginx/html/media:ro
      - ./frontend/dist/frontend/browser:/usr/share/nginx/html:ro
    depends_on:
      - django
      - fastapi

volumes:
  pg_data:
  redis_data:
  static_files:
  media_files:
