name: patchguard

services:
  postgres:
    image: postgres:16-alpine
    container_name: patchguard-postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: patchguard-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    env_file: .env
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchguard-django
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  fastapi:
    build:
      context: ./realtime
      dockerfile: Dockerfile
    container_name: patchguard-fastapi
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    env_file: .env
    volumes:
      - ./realtime:/app
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchguard-celery-worker
    restart: unless-stopped
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A config.celery_app worker --loglevel=info -Q critical,default,reporting --concurrency=4
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: patchguard-celery-beat
    restart: unless-stopped
    command: watchmedo auto-restart --directory=./ --pattern=*.py --recursive -- celery -A config.celery_app beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      django:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: patchguard-frontend
    restart: unless-stopped
    command: npm start
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4200:4200"

volumes:
  postgres_data:
  redis_data:
